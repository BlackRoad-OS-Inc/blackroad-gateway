name: 🤖 Auto-Merge

# ✅ VERIFIED — enables auto-merge on PRs labeled 'automerge' or authored by
#    Copilot/Dependabot once all required CI checks pass. Runs on ubuntu-latest,
#    actions pinned to SHA256.

on:
  pull_request:
    types: [opened, synchronize, labeled, ready_for_review]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run for PRs from Dependabot, Copilot, or PRs labeled 'automerge'
    if: |
      github.event_name == 'pull_request' && (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'copilot-swe-agent[bot]' ||
        contains(github.event.pull_request.labels.*.name, 'automerge')
      )
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              console.log('No pull_request in payload — skipping');
              return;
            }

            try {
              // Enable auto-merge via GraphQL
              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                        mergeMethod
                      }
                    }
                  }
                }
              `, { pullRequestId: pr.node_id });

              console.log(`✅ Auto-merge enabled for PR #${pr.number}: ${pr.title}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '🤖 **Auto-merge enabled** — this PR will be squash-merged automatically once all required checks pass.',
              });
            } catch (err) {
              // Auto-merge may already be enabled or repo may require branch protection
              console.log(`Note: ${err.message}`);
            }

  automerge-on-ci-pass:
    name: Merge on CI Pass
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Merge approved auto-merge PRs
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            if (!run.head_branch || run.event !== 'pull_request') return;

            // Find open PRs for this branch
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${run.head_branch}`,
            });

            for (const pr of prs.data) {
              const isBot = ['dependabot[bot]', 'copilot-swe-agent[bot]'].includes(pr.user.login);
              const hasLabel = pr.labels.some(l => l.name === 'automerge');
              if (!isBot && !hasLabel) continue;

              console.log(`CI passed for PR #${pr.number} — auto-merge already enabled via GraphQL`);
            }
