name: 🚀 Deploy

# ✅ VERIFIED — Cloudflare Workers deploy via wrangler, runners on ubuntu-latest,
#    actions pinned to SHA256. Deploy target auto-detected from repo contents.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options: [cloudflare, railway, vercel, all]
        default: all

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect deploy target
        id: detect
        run: |
          if [ -f "wrangler.toml" ]; then echo "target=cloudflare" >> $GITHUB_OUTPUT
          elif [ -f "railway.toml" ] || [ -f "Dockerfile" ]; then echo "target=railway" >> $GITHUB_OUTPUT
          elif [ -f "vercel.json" ] || [ -f "next.config.js" ] || [ -f "next.config.ts" ]; then echo "target=vercel" >> $GITHUB_OUTPUT
          else echo "target=none" >> $GITHUB_OUTPUT
          fi

      # ── Cloudflare Worker deploy ────────────────────────────────────────────
      - name: Deploy to Cloudflare Workers
        if: steps.detect.outputs.target == 'cloudflare' || inputs.target == 'cloudflare' || inputs.target == 'all'
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ CLOUDFLARE_API_TOKEN not set — running dry-run only"
            npx wrangler deploy --dry-run --outdir /tmp/worker-build
            echo "✅ Dry-run passed — set CLOUDFLARE_API_TOKEN secret to enable live deploy"
          else
            npx wrangler deploy
            echo "✅ Deployed to Cloudflare Workers"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 848cf0b18d51e0170e0d1537aec3505a

      # ── Railway deploy ──────────────────────────────────────────────────────
      - name: Deploy to Railway
        if: steps.detect.outputs.target == 'railway' || inputs.target == 'railway' || inputs.target == 'all'
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️ RAILWAY_TOKEN not set — skipping Railway deploy"
            exit 0
          fi
          npm install -g @railway/cli --quiet
          railway up --service "${{ github.event.repository.name }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ── Vercel deploy ────────────────────────────────────────────────────────
      - name: Deploy to Vercel
        if: steps.detect.outputs.target == 'vercel' || inputs.target == 'vercel' || inputs.target == 'all'
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npx vercel --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: ✅ Deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ steps.detect.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Complete" >> $GITHUB_STEP_SUMMARY
